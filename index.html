<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart就業規則チェッカー</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');

      // ダミーデータ：顧問先企業の就業規則管理状況
      const [rules] = useState([
        { id: 1, companyName: '株式会社テックフロンティア', lastUpdated: '2024-04-01', status: '要更新', pendingRevisions: 3, fileUrl: '#' },
        { id: 2, companyName: 'デザインワークス合同会社', lastUpdated: '2025-10-01', status: '最新', pendingRevisions: 0, fileUrl: '#' },
        { id: 3, companyName: '青木工務店', lastUpdated: '2022-04-01', status: '危険', pendingRevisions: 8, fileUrl: '#' },
        { id: 4, companyName: '株式会社ライフケア', lastUpdated: '2026-04-01', status: '確認中', pendingRevisions: 1, fileUrl: '#' },
      ]);

      // ダミーデータ：最新の法改正情報
      const [lawUpdates] = useState([
        { id: 'l1', date: '2026-04-01', title: '育児・介護休業法の改正（柔軟な働き方の拡充）', impact: 'high', description: '3歳以上の小学校就学前の子を育てる労働者に対する、柔軟な働き方を実現するための措置の義務化など。' },
        { id: 'l2', date: '2026-04-01', title: '労働基準法の改正（労働条件明示ルールの変更）', impact: 'medium', description: '労働契約締結時等における労働条件の明示事項に、就業場所・業務の変更の範囲等が追加。' },
        { id: 'l3', date: '2025-04-01', title: '次世代育成支援対策推進法の改正', impact: 'low', description: '一般事業主行動計画の策定義務の対象拡大など。' },
      ]);

      // ダミーデータ：AI解析結果（修正提案）
      const [aiSuggestions, setAiSuggestions] = useState([
        { 
          id: 's1', 
          companyId: 1, 
          lawUpdateId: 'l1',
          articleName: '第45条（育児休業）', 
          currentText: '従業員は、子が1歳に達するまで育児休業を申し出ることができる。',
          suggestedText: '従業員は、子が1歳に達するまで（一定の要件を満たす場合は最長2歳まで）育児休業を申し出ることができる。また、3歳以上の小学校就学前の子を育てる従業員は、会社が定める柔軟な働き方制度を利用することができる。',
          status: 'レビュー待ち',
          reason: '2026年4月施行の育児・介護休業法改正に伴い、3歳以上の子に対する柔軟な働き方の措置についての追記が必要です。'
        },
        { 
          id: 's2', 
          companyId: 3, 
          lawUpdateId: 'l2',
          articleName: '第5条（採用時の提出書類及び労働条件の明示）', 
          currentText: '会社は、採用内定者に対し、採用通知書及び労働条件通知書を交付する。',
          suggestedText: '会社は、採用内定者に対し、採用通知書及び労働条件通知書を交付する。労働条件通知書には、雇入れ直後の就業場所及び従事すべき業務の内容に加え、これらの変更の範囲を明示するものとする。',
          status: '承認済',
          reason: '労働基準法施行規則の改正により、労働条件の明示事項に変更の範囲が追加されたため、規則上も明記することを推奨します。'
        }
      ]);

      const handleSuggestionStatusChange = (suggestionId, newStatus) => {
        setAiSuggestions(aiSuggestions.map(s => s.id === suggestionId ? { ...s, status: newStatus } : s));
      };

      const renderContent = () => {
        switch (activeTab) {
          case 'dashboard':
            return <Dashboard rules={rules} lawUpdates={lawUpdates} />;
          case 'ai-check':
            return <AiChecker rules={rules} aiSuggestions={aiSuggestions} lawUpdates={lawUpdates} onStatusChange={handleSuggestionStatusChange} />;
          case 'laws':
            return <LawUpdatesDatabase lawUpdates={lawUpdates} />;
          default:
            return <Dashboard rules={rules} lawUpdates={lawUpdates} />;
        }
      };

      return (
        <div className="flex h-screen bg-gray-50">
          {/* サイドバー（旅費規程・助成金と統一） */}
          <div className="w-64 bg-slate-900 text-white flex flex-col">
            <div className="p-6 flex items-center space-x-3">
              <i className="fas fa-book-open text-3xl text-purple-500"></i>
              <h1 className="text-xl font-bold tracking-wider leading-tight">Smart<br/>就業規則AI</h1>
            </div>
            <nav className="flex-1 px-4 space-y-2 mt-4">
              <NavItem 
                icon={<i className="fas fa-chart-pie text-lg w-6 text-center"></i>} 
                label="顧問先・管理ダッシュボード" 
                isActive={activeTab === 'dashboard'} 
                onClick={() => setActiveTab('dashboard')} 
              />
              <NavItem 
                icon={<i className="fas fa-robot text-lg w-6 text-center"></i>} 
                label="AI条文チェック・修正提案" 
                isActive={activeTab === 'ai-check'} 
                onClick={() => setActiveTab('ai-check')} 
              />
              <NavItem 
                icon={<i className="fas fa-gavel text-lg w-6 text-center"></i>} 
                label="法改正データベース" 
                isActive={activeTab === 'laws'} 
                onClick={() => setActiveTab('laws')} 
              />
            </nav>
            <div className="p-4 m-4 bg-slate-800 rounded-lg">
              <p className="text-xs text-slate-400">ログイン中</p>
              <div className="flex items-center space-x-2 mt-1">
                <div className="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center">
                  <i className="fas fa-user-tie text-sm"></i>
                </div>
                <span className="text-sm font-medium">スマート社労士法人</span>
              </div>
            </div>
          </div>

          {/* メインコンテンツ */}
          <div className="flex-1 overflow-auto">
            <header className="bg-white shadow-sm px-8 py-4 flex justify-between items-center">
              <h2 className="text-2xl font-semibold text-gray-800">
                {activeTab === 'dashboard' && '顧問先の就業規則 管理ダッシュボード'}
                {activeTab === 'ai-check' && 'AIによる条文解析・新旧対照表生成'}
                {activeTab === 'laws' && '最新の法改正・施行スケジュール'}
              </h2>
              <div className="flex items-center space-x-4">
                <button className="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg shadow-sm text-sm font-medium transition-colors">
                  <i className="fas fa-upload mr-2"></i>規則ファイル(Word)をアップロード
                </button>
              </div>
            </header>
            <main className="p-8">
              {renderContent()}
            </main>
          </div>
        </div>
      );
    }

    function NavItem({ icon, label, isActive, onClick }) {
      return (
        <button
          onClick={onClick}
          className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors duration-200 ${
            isActive 
              ? 'bg-purple-600 text-white shadow-md' 
              : 'text-slate-300 hover:bg-slate-800 hover:text-white'
          }`}
        >
          {icon}
          <span className="font-medium text-left leading-tight">{label}</span>
        </button>
      );
    }

    // ==========================================
    // ダッシュボード（管理状況）
    // ==========================================
    function Dashboard({ rules, lawUpdates }) {
      const urgentRules = rules.filter(r => r.status === '要更新' || r.status === '危険');
      
      return (
        <div className="space-y-6">
          {/* ヒーローバナー */}
          <div className="bg-gradient-to-r from-purple-600 to-fuchsia-600 rounded-2xl p-8 text-white shadow-lg flex items-center justify-between">
            <div>
              <span className="inline-block px-3 py-1 bg-white/20 rounded-full text-sm font-bold mb-4">
                <i className="fas fa-bolt mr-1"></i> 法改正対応を全自動化
              </span>
              <h3 className="text-3xl font-bold mb-2">何十社分もの規則修正、<br/>もう手作業で探す必要はありません。</h3>
              <p className="text-purple-100 mt-2">AIが顧問先のWordファイルを解析し、法改正に対応していない条文をハイライトします。</p>
            </div>
            <div className="hidden md:block">
              <i className="fas fa-file-contract text-[7rem] text-white/80 opacity-80"></i>
            </div>
          </div>

          {/* KPI */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <KpiCard 
              title="アップデートが必要な顧問先" 
              amount={`${urgentRules.length}社`} 
              subtitle="※最新の法改正が反映されていません"
              icon={<i className="fas fa-exclamation-triangle text-rose-500 text-xl"></i>}
              color="rose"
            />
            <KpiCard 
              title="AIが検知した修正箇所（全体）" 
              amount="12 箇所" 
              subtitle="レビュー待ちの条文数"
              icon={<i className="fas fa-robot text-purple-500 text-xl"></i>}
              color="purple"
            />
            <KpiCard 
              title="直近の重要な法改正" 
              amount="2026年4月" 
              subtitle="育児・介護休業法 ほか"
              icon={<i className="fas fa-calendar-check text-emerald-500 text-xl"></i>}
              color="emerald"
            />
          </div>

          {/* 顧問先リスト */}
          <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div className="p-6 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
              <h3 className="text-lg font-bold text-gray-800">
                <i className="fas fa-building text-purple-600 mr-2"></i>
                顧問先の就業規則 管理状況
              </h3>
              <div className="flex space-x-2">
                <input type="text" placeholder="顧問先を検索..." className="border border-gray-300 rounded px-3 py-1 text-sm outline-none focus:ring-2 focus:ring-purple-500" />
              </div>
            </div>

            <table className="w-full text-left">
              <thead>
                <tr className="bg-gray-50 text-gray-600 text-sm border-b">
                  <th className="p-4 font-semibold">顧問先名</th>
                  <th className="p-4 font-semibold">最終更新日</th>
                  <th className="p-4 font-semibold">ステータス</th>
                  <th className="p-4 font-semibold text-center">AI修正提案</th>
                  <th className="p-4 font-semibold text-right">アクション</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                {rules.map(rule => (
                  <tr key={rule.id} className="hover:bg-gray-50/50">
                    <td className="p-4 font-bold text-gray-800">{rule.companyName}</td>
                    <td className="p-4 text-gray-600">{rule.lastUpdated}</td>
                    <td className="p-4">
                      <span className={`px-2 py-1 rounded text-xs font-bold ${
                        rule.status === '最新' ? 'bg-emerald-100 text-emerald-700' : 
                        rule.status === '要更新' ? 'bg-amber-100 text-amber-700' :
                        rule.status === '危険' ? 'bg-rose-100 text-rose-700' :
                        'bg-gray-100 text-gray-700'
                      }`}>
                        {rule.status}
                      </span>
                    </td>
                    <td className="p-4 text-center">
                      {rule.pendingRevisions > 0 ? (
                        <span className="inline-flex items-center justify-center bg-purple-100 text-purple-700 text-xs font-bold px-2 py-1 rounded-full">
                          {rule.pendingRevisions}件の提案
                        </span>
                      ) : (
                        <span className="text-gray-400 text-sm"><i className="fas fa-check text-emerald-500 mr-1"></i>完了</span>
                      )}
                    </td>
                    <td className="p-4 text-right">
                      {rule.pendingRevisions > 0 ? (
                        <button className="bg-purple-50 text-purple-600 px-3 py-1 rounded text-sm font-medium hover:bg-purple-100 transition-colors">
                          AI解析を見る
                        </button>
                      ) : (
                        <button className="text-gray-500 text-sm hover:text-gray-700 font-medium">詳細</button>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function KpiCard({ title, amount, subtitle, icon, color }) {
      const bgColors = {
        purple: 'bg-purple-50',
        emerald: 'bg-emerald-50',
        rose: 'bg-rose-50',
      };
      return (
        <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-100 flex flex-col justify-between">
          <div className="flex justify-between items-start mb-4">
            <h4 className="text-gray-500 font-medium text-sm">{title}</h4>
            <div className={`p-3 rounded-lg ${bgColors[color]}`}>
              {icon}
            </div>
          </div>
          <div>
            <div className="text-3xl font-bold text-gray-800 mb-1">{amount}</div>
            <p className="text-xs text-gray-400">{subtitle}</p>
          </div>
        </div>
      );
    }

    // ==========================================
    // AI条文チェック（新旧対照表UI）
    // ==========================================
    function AiChecker({ rules, aiSuggestions, lawUpdates, onStatusChange }) {
      // 最初の顧問先を選択状態にする（ダミー）
      const [selectedCompanyId, setSelectedCompanyId] = useState(1);
      
      const companySuggestions = aiSuggestions.filter(s => s.companyId === selectedCompanyId);
      const company = rules.find(r => r.id === selectedCompanyId);

      return (
        <div className="flex flex-col h-[calc(100vh-12rem)] space-y-4">
          
          {/* コントロールバー */}
          <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center shrink-0">
            <div className="flex items-center space-x-4">
              <label className="text-sm font-medium text-gray-600">対象顧問先:</label>
              <select 
                value={selectedCompanyId} 
                onChange={e => setSelectedCompanyId(Number(e.target.value))}
                className="border border-gray-300 rounded-lg px-4 py-2 font-bold text-gray-800 outline-none focus:ring-2 focus:ring-purple-500"
              >
                {rules.map(r => (
                  <option key={r.id} value={r.id}>{r.companyName}</option>
                ))}
              </select>
            </div>
            <div className="flex space-x-3">
              <button className="bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-50 shadow-sm flex items-center">
                <i className="fas fa-file-word mr-2 text-blue-600"></i>
                Wordで出力
              </button>
              <button className="bg-purple-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-purple-700 shadow-sm flex items-center">
                <i className="fas fa-paper-plane mr-2"></i>
                顧問先へ提案（新旧対照表）
              </button>
            </div>
          </div>

          {/* メイン解析エリア（2カラム） */}
          <div className="flex-1 flex gap-6 overflow-hidden">
            
            {/* 左：AIからの指摘リスト */}
            <div className="w-1/3 bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col overflow-hidden">
              <div className="p-4 border-b border-gray-100 bg-purple-50/50 shrink-0">
                <h3 className="font-bold text-gray-800 flex items-center">
                  <i className="fas fa-robot text-purple-600 mr-2"></i> AI解析結果
                  <span className="ml-2 bg-rose-100 text-rose-700 text-xs px-2 py-1 rounded-full">{companySuggestions.length}件の修正提案</span>
                </h3>
              </div>
              <div className="flex-1 overflow-y-auto p-4 space-y-4">
                {companySuggestions.length === 0 ? (
                  <div className="text-center text-gray-500 py-10">
                    <i className="fas fa-check-circle text-4xl text-emerald-400 mb-3"></i>
                    <p>修正が必要な条文は見つかりませんでした。</p>
                  </div>
                ) : (
                  companySuggestions.map((suggestion, index) => {
                    const law = lawUpdates.find(l => l.id === suggestion.lawUpdateId);
                    return (
                      <div key={suggestion.id} className="border border-purple-200 rounded-lg p-4 bg-white shadow-sm hover:shadow-md transition-shadow cursor-pointer relative overflow-hidden">
                        <div className={`absolute left-0 top-0 bottom-0 w-1 ${suggestion.status === 'レビュー待ち' ? 'bg-amber-400' : 'bg-emerald-400'}`}></div>
                        <div className="flex justify-between items-start mb-2">
                          <span className="text-xs font-bold text-purple-600 bg-purple-50 px-2 py-1 rounded">
                            {suggestion.articleName}
                          </span>
                          <span className={`text-xs px-2 py-1 rounded ${suggestion.status === 'レビュー待ち' ? 'text-amber-700 bg-amber-50' : 'text-emerald-700 bg-emerald-50'}`}>
                            {suggestion.status}
                          </span>
                        </div>
                        <p className="text-sm font-bold text-gray-800 mb-2">{law?.title} 対応</p>
                        <p className="text-xs text-gray-600 line-clamp-2">{suggestion.reason}</p>
                      </div>
                    );
                  })
                )}
              </div>
            </div>

            {/* 右：新旧対照表プレビュー */}
            <div className="w-2/3 bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col overflow-hidden">
              <div className="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center shrink-0">
                <h3 className="font-bold text-gray-800"><i className="fas fa-columns text-gray-500 mr-2"></i>新旧対照表エディタ</h3>
              </div>
              <div className="flex-1 overflow-y-auto p-8 bg-slate-100">
                
                {/* A4用紙風 */}
                <div className="bg-white shadow-md mx-auto rounded-sm p-10 min-h-full max-w-4xl font-serif">
                  <h2 className="text-xl font-bold text-center mb-8 pb-4 border-b-2 border-gray-800">
                    就業規則 変更（案）新旧対照表
                  </h2>
                  
                  {companySuggestions.length > 0 ? (
                    <div className="space-y-12">
                      {companySuggestions.map(suggestion => (
                        <div key={suggestion.id} className="space-y-4">
                          <div className="flex justify-between items-end mb-2">
                            <h4 className="font-bold text-lg">{suggestion.articleName}</h4>
                            <div className="flex space-x-2">
                               {suggestion.status === 'レビュー待ち' && (
                                  <button 
                                    onClick={() => onStatusChange(suggestion.id, '承認済')}
                                    className="text-xs bg-emerald-50 text-emerald-600 border border-emerald-200 px-3 py-1 rounded hover:bg-emerald-100 flex items-center"
                                  >
                                    <i className="fas fa-check mr-1"></i>この提案を採用
                                  </button>
                               )}
                            </div>
                          </div>
                          
                          <div className="grid grid-cols-2 gap-0 border border-gray-400">
                            {/* 改正案（新） */}
                            <div className="border-r border-gray-400 p-4">
                              <div className="text-center font-bold text-sm mb-4 pb-2 border-b border-gray-300">改正案（新）</div>
                              <div className="text-sm leading-relaxed whitespace-pre-wrap">
                                {/* AI提案文のハイライト処理（簡易的） */}
                                {suggestion.suggestedText.split('。').map((sentence, i) => {
                                  if (!sentence) return null;
                                  // 元のテキストに含まれない部分を赤字にする簡易ロジック
                                  const isNew = !suggestion.currentText.includes(sentence);
                                  return (
                                    <span key={i} className={isNew ? 'text-rose-600 font-bold underline decoration-rose-300 decoration-2 underline-offset-4' : ''}>
                                      {sentence}。
                                    </span>
                                  );
                                })}
                              </div>
                            </div>
                            {/* 現行規則（旧） */}
                            <div className="p-4 bg-gray-50/50">
                              <div className="text-center font-bold text-sm mb-4 pb-2 border-b border-gray-300">現行規則（旧）</div>
                              <div className="text-sm leading-relaxed whitespace-pre-wrap text-gray-600">
                                {suggestion.currentText}
                              </div>
                            </div>
                          </div>
                          
                          {/* AIの解説コメント */}
                          <div className="bg-purple-50 p-3 rounded-lg border border-purple-100 flex items-start">
                             <i className="fas fa-info-circle text-purple-500 mt-0.5 mr-2"></i>
                             <div>
                               <p className="text-xs font-bold text-purple-800 mb-1">社労士向け AIメモ</p>
                               <p className="text-xs text-purple-700">{suggestion.reason}</p>
                             </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <p className="text-center text-gray-500 mt-20">左側のリストから修正提案を選択してください。</p>
                  )}
                </div>

              </div>
            </div>

          </div>
        </div>
      );
    }

    // ==========================================
    // 法改正データベース
    // ==========================================
    function LawUpdatesDatabase({ lawUpdates }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div className="p-6 border-b border-gray-100 bg-gray-50">
            <h3 className="text-lg font-bold text-gray-800">施行予定の法改正スケジュール</h3>
            <p className="text-sm text-gray-500 mt-1">※このデータベースに基づいてAIが顧問先の就業規則をチェックします。</p>
          </div>
          <div className="p-6">
            <div className="relative border-l-2 border-purple-200 ml-4 space-y-8">
              {lawUpdates.sort((a, b) => new Date(b.date) - new Date(a.date)).map(law => (
                <div key={law.id} className="relative pl-6">
                  <div className="absolute w-4 h-4 bg-purple-600 rounded-full -left-[9px] top-1 border-4 border-white shadow-sm"></div>
                  <div className="mb-1">
                    <span className="text-sm font-bold text-purple-600 bg-purple-50 px-2 py-1 rounded">施行日: {law.date}</span>
                  </div>
                  <h4 className="text-lg font-bold text-gray-800 mt-2 mb-2">{law.title}</h4>
                  <p className="text-sm text-gray-600 bg-gray-50 p-4 rounded-lg border border-gray-100">
                    {law.description}
                  </p>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
